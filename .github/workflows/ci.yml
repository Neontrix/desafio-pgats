# Nome dinâmico: mostra contexto do gatilho (manual, cron, push)
name: ${{ github.event_name == 'workflow_dispatch' && 'disparo manual' || github.event_name == 'schedule' && 'disparo por cron' || github.event_name == 'push' && 'disparo por push' || 'CI - Testes de Login' }}

# Objetivo: executar testes automatizados via GitHub Actions com múltiplos gatilhos
on:
  push:
    branches: [main, master]
  workflow_dispatch: {}
  schedule:
    - cron: '*/5 * * * *' # Temporário: executa a cada 5 minutos para teste

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Fazer checkout do código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '18'

      - name: Instalar dependências
        run: npm install

      - name: Executar testes
        run: npm test

      - name: Upload do relatório Mochawesome
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mochawesome-report
          path: mochawesome-report/**
