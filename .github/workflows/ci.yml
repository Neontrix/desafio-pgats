# Nome dinâmico: mostra contexto do gatilho (manual, cron, push)
# Nome fixo do workflow para push/cron
name: CI - Testes de Login

# Objetivo: executar testes automatizados via GitHub Actions com múltiplos gatilhos
on:
  push:
    branches: [main, master]
  schedule:
    - cron: '*/1 * * * *' # Temporário: executa a cada 1 minuto para teste (reverta após o disparo)

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Fazer checkout do código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '18'

      - name: Instalar dependências
        run: npm install

      - name: Executar testes
        run: npm test

      - name: Upload do relatório Mochawesome
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mochawesome-report
          path: mochawesome-report/**
